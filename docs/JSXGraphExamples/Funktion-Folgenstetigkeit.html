<head>
  <title>Stückweise definierte Funktion</title>
  <meta name="robots" content="noindex, nofollow" />
  <meta name="viewport" id="vv" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <meta charset="utf-8" />
  <script type="text/javascript" charset="UTF-8"
    src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>
  <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css" />
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>


  <style>
    body {
      margin: 50px;
      font-family: sans-serif;
    }
  </style>
</head>


<body>

  <H1>Stückweise definierte Funktion</H1>

  <center>

    <div id="box1" class="jxgbox" style="width:500px; height:400px; "></div>
    <br clear="all">
    <script language="JavaScript">
      "use strict";
      var n, button1, button2, v2, v3, p1, p2, p3u, p3o, eps, p4u, p4o, pol, val, l1, l2, l3, TO, b1, a, b, f, graph, v2, v3;
      b1 = JXG.JSXGraph.initBoard('box1', { boundingbox: [-5, 2.8, 5, -5.2], grid: true, axis: true });
      b1.snapToGrid = true;
      a = b1.create('slider', [[1, 2], [3, 2], [-2, -1, 2]], { name: 'a' });
      b = b1.create('slider', [[1, 1.5], [3, 1.5], [-2, 1, 2]], { name: 'b' });
      a.on("down",()=>{clear_all();v2.clearTrace();v3.clearTrace();});
      b.on("down",()=>{clear_all();v2.clearTrace();v3.clearTrace();});
      v2 = b1.create('point', [0, 0],
        { size: 2, strokeColor: JXG.palette.red, name: "a_n", trace: false, visible: false });
      v3 = b1.create('point', [0, 0],
        {
          size: 1, fillColor: JXG.palette.green, strokeColor: JXG.palette.green,
          name: "", trace: false, visible: false
        });

      var f = function (x) {
        if (x < -1.57) {
          return -2 * Math.sin(x);
        }
        else if (x < 1.57) {
          return a.Value() * Math.sin(x) + b.Value();
        }
        else {
          return Math.cos(x);
        }
      };
      graph = b1.create('functiongraph', [f], { strokeColor: JXG.palette.skyblue });

      var seq = b1.create('curve', [[], []], { strokeColor: 'blue' });
      var inputan = b1.create('input', [-4, -2, 'PI/2-1/n', 'a_n='], { cssStyle: 'width: 100px', frozen: true });
      var button1 = b1.create('button', [-1.3, -2, 'start', function () { start_approx(); }], { frozen: true });
      var button2 = b1.create('button', [0.1, -2, 'stop', function () { clear_all(); }], { frozen: true });
      var inputstart = b1.create('input', [1, -2, '1', 'start at n='], { cssStyle: 'width: 50px', frozen: true });
      var buttonex1 = b1.create('button', [-4, -3, 'PI/2-1/n', function () { updateInputAn('PI/2-1/n'); }], { frozen: true });
      var buttonex2 = b1.create('button', [-2.5, -3, 'PI/2-(-1)^n/n', function () { updateInputAn('PI/2-(-1)^n/n'); }], { frozen: true });
      var buttonex3 = b1.create('button', [-0.8, -3, 'PI/2+(-1)^n/2', function () { updateInputAn('PI/2+(-1)^n/2'); }], { frozen: true });
      var buttonex4 = b1.create('button', [1, -3, 'PI/2-0.9^n', function () { updateInputAn('PI/2-0.9^n'); }], { frozen: true });
      var buttonex5 = b1.create('button', [2.5, -3, 'PI+1/n', function () { updateInputAn('PI+1/n'); }], { frozen: true });
      var buttonex6 = b1.create('button', [-4, -4, '(1+1/n)^n/2', function () { updateInputAn('(1+1/n)^n/2'); }], { frozen: true });
      var buttonex7 = b1.create('button', [-2.5, -4, '-PI/2+(-1)^n*1/n', function () { updateInputAn('-PI/2+(-1)^n*1/n'); }], { frozen: true });
      var buttonex8 = b1.create('button', [0.5, -4, '(-PI/2+(-0.5)^n/n)', function () { updateInputAn('-PI/2+(-0.5)^n/n'); }], { frozen: true });

      function updateInputAn(newstring) {
        inputan.set(newstring)

      }

      var seq_add = function () {
        var val = a_n(n);
        seq.dataX.push(val);
        seq.dataY.push(0);
        v2.setPosition(JXG.COORDS_BY_USER, [val, 0]);
        v3.setPosition(JXG.COORDS_BY_USER, [val, f(val)]);
        n++;
      };

      var approx = function () {
        seq_add();
        b1.update();
        if (n <= 50) {
          TO = setTimeout(approx, 500);
        }
      };

      var a_n;
      var start_approx = function () {
        a_n = b1.jc.snippet(inputan.Value(), true, 'n', true);
        seq.dataX = [];
        seq.dataY = [];
        n = b1.jc.snippet(inputstart.Value(), false, ' ', false);
        val = a_n(n);
        v2.setPosition(JXG.COORDS_BY_USER, [val, 0]);
        v2.setAttribute({ visible: true, trace: false });
        v3.setPosition(JXG.COORDS_BY_USER, [val, f(val)]);
        v3.setAttribute({ visible: true, trace: true });
        v2.clearTrace();
        v3.clearTrace();
        approx();
      }

      var clear_all = function () {
        clearTimeout(TO);
      };

    </script>

  </center>

  <footer>Wigand Rathmann, FAU, <a href="https://creativecommons.org/licenses/by/4.0/">CC-BY 4.0</a></footer>

</body>

</html>

<body>

    <h1>Boat on a Lake</h1>
    <div id="jxgbox" class="jxgbox" style="width:600px; height:600px;"></div>
    <center>
        <p><button onclick="controlAnimate();">Go ahead!</button> &nbsp;
        <button onclick="toggleList([im2,curveC,point]);">Deco</button> &nbsp;</p>
    </center>
    <br clear="all">
    <script language="JavaScript">
        "use strict";
        JXG.Options.text.useMathJax = true;
        var jxgbox = document.getElementById('jxgbox');

        var s, o;
        var board, point;
        var f, fx, fy, ftxt, field = [], fxdy, fydx, phiDotFun, phiDottxt;
        var inputfx, inputfy;
        var curveN, curveh, curveC, curveG, curveG1, curveG2, data = [], datat = [], curvet;
        var curveG, polygon, polygon2, p2, p, deltax, deltay, angle;
        var splineX, splineY, splineXdd, splineYdd, tmax, phiDott = [], phit = [], phitdd = [];
        var bFieldT, bFieldS, bTraject, bPhi, bPhiDot, phiDotFlag, animFlag;
        var p, p2, deltax, deltay, transrot, transtrans, im, im2;
        deltax = 1;
        deltay = 1;
        phiDotFlag = false;
        animFlag = false;

        var imwidth = 1.5,
            imheight = 1.5;

        var init = function () {
            board = JXG.JSXGraph.initBoard('jxgbox', {
                axis: true,
                boundingbox: [-5, 5, 5, -5]
            });
            board.renderer.container.style.backgroundColor = '#8FCFD9';
            inputfx = board.create('input', [-4.1, 4.5, 'abs(x)-y', '\\(f_1(x,y)=\\)'], {
                visible: false,
                fixed: true
            });
            inputfy = board.create('input', [-4.1, 4.1, 'sin(x)', '\\(f_2(x,y)=\\)'], {
                visible: false,
                fixed: true
            });
            s = board.create('slider', [
                [1.1, 4.7],
                [3.1, 4.7],
                [0, 0.5, 1]
            ], {
                name: 'length', visible: false
            });
            o = board.create('slider', [
                [1.1, 4.3],
                [3.1, 4.3],
                [0, 0.25, 1]
            ], {
                name: 'opacity', visible: false
            });

            // trajectory
            point = board.create('point', [-2, 2], { name: '\\((x_0,y_0)\\)', color: 'red' });
            curveN = board.create('slider', [
                [1.1, 3.9],
                [3.1, 3.9],
                [20, 100, 200]
            ], {
                name: 'N', snapWidth: 1, visible: false
            });
            curveh = board.create('slider', [
                [1.1, 3.5],
                [3.1, 3.5],
                [0.05, 0.1, 0.8]
            ], {
                name: 'h', snapWidth: 0.05, visible: false
            });
            curvet = board.create('slider', [
                [1.1, -3.5],
                [3.1, -3.5],
                [0, 0.1, 1]
            ], {
                name: 't', snapWidth: 0.01, visible: true
            });
            bFieldT = board.create('button', [-4.1, -3.7, "vector field",
            function () { toggleList([field]); },
            ],
                { fixed: true, visible: false }
            );

            bFieldS = board.create(
                "button",
                [-4.1, 3.5, "set vector field",
                function () { plot(); },
                ],
                { fixed: true, visible: false }
            );
            bTraject = board.create("button", [-4.1, -4.1, "trajectory",
            function () { toggleList([curveC, point]); },
            ],
                { fixed: true, visible: false }
            );
            bPhi = board.create("button", [-4.1, -4.5, "\\(\\varphi\\)", function () { phiDotFlag = false; createGlider(); },],
                {
                    fixed: true,
                    cssClass: () => (phiDotFlag ? 'mybuttoninactiv' : 'mybuttonactiv'),
                    highlightCssClass: 'mybuttoninactiv'
                }
            );
            bPhiDot = board.create("button", [-3.5, -4.5, "\\(\\dot\\varphi\\)", function () { phiDotFlag = true; createGlider(); },],
                {
                    fixed: true,
                    cssClass: () => (phiDotFlag ? 'mybuttonactiv' : 'mybuttoninactiv'),
                    highlightCssClass: 'mybuttoninactiv'
                }
            );
            /*Events
            */
            curveh.on("down", (e) => (curvet.setAttribute({ visible: false }), curveG.setAttribute({ visible: false })));
            curveh.on("up", (e) => createGlider());
            curveN.on("down", (e) => (curvet.setAttribute({ visible: false }), curveG.setAttribute({ visible: false })));
            curveN.on("up", (e) => createGlider());
            point.on("down", (e) => (
                curvet.setAttribute({ visible: false }),
                im.setAttribute({ visible: false })));
            point.on("up", (e) => createGlider());
        };

        var plot = function () {

            board.removeObject([field, curveC]);
            fx = board.jc.snippet(inputfx.Value(), true, 'x,y');
            fy = board.jc.snippet(inputfy.Value(), true, 'x,y');
            ftxt = '[' + inputfx.Value() + ',' + inputfy.Value() + ']';
            ftxt = ftxt.replace(/x/g, "x[0]");
            ftxt = ftxt.replace(/y/g, "x[1]");
            /* generate function for \dot \phi(t)*/
            let fxdytxt = board.jc.manipulate(("D(" + inputfx.Value() + ",y);"));
            let fydxtxt = board.jc.manipulate(("D(" + inputfy.Value() + ",x);"));
            phiDottxt = "(" + fydxtxt + "-(" + fxdytxt + "))/2";

            // generatet function used in Numerics.rungeKutta
            f = board.jc.snippet(ftxt, true, 't,x');

            field = board.create('vectorfield', [
                [fx, fy],
                [-4, 20, 4],
                [-4, 20, 4]], {
                strokeWidth: 1.5,
                highlightStrokeWidth: 0.5,
                strokeColor: JXG.palette.darkblue,
                strokeOpacity: () => o.Value(),
                highlightstrokeOpacity: () => o.Value(),
                highlightStrokeColor: JXG.palette.darkblue,
                scale: () => s.Value(),
                arrowHead: {
                    enabled: true,
                    size: 8,
                    angle: Math.PI / 16
                },
                visible: true
            });
            curveC = board.create('curve', [[], []], { strokeWidth: 3 });
            curveC.updateDataArray = function () {
                // remove point on "shadow" curve
                // removeGlider();
                this.dataX = [];
                this.dataY = [];
                var h = curveh.Value();
                var N = curveN.Value();
                tmax = h * N;
                data = JXG.Math.Numerics.rungeKutta('rk4', [point.X(), point.Y()], [0, h * N], N, f);
                for (var i = 0; i < curveN.Value(); i++) {
                    this.dataX[i] = data[i][0];
                    this.dataY[i] = data[i][1];
                }
            };
            // der Punkt auf der Trajektorie muss neu konstruiert werden
            // das passiert aber nur, bei bestimmten Events, damit es nicht ständig neu generiert wird. 
            createGlider();

        }


        function createGlider() {
            board.removeObject([curveG, im, im2]);
            phiDotFun = board.jc.snippet(phiDottxt, true, "x,y");

            // build spline form RK result
            // build t vector
            datat = [];
            splineX = [];
            splineXdd = [];
            splineY = [];
            splineYdd = [];
            phiDott = [];
            phitdd = [];
            // t vector
            datat = data.map(function (v, i) { return i * curveh.Value() });
            // x and y coordinates
            splineX = data.map(function (v) { return v[0] });
            splineY = data.map(function (v) { return v[1] });
            // vector with angular velocity
            phiDott = data.map(function (v) { return phiDotFun(v[0], v[1]) });
            phit = [];
            // accumulate the angle by trapeziodal rule
            phit[0] = 0;
            for (let iloop = 0; iloop < datat.length - 1; iloop++) {
                phit.push(phit[iloop] + curveh.Value() * (phiDott[iloop] + phiDott[iloop + 1]) / 2);
            }
            // build now the splines
            splineXdd = JXG.Math.Numerics.splineDef(datat, splineX);
            splineYdd = JXG.Math.Numerics.splineDef(datat, splineY);
            phitdd = JXG.Math.Numerics.splineDef(datat, phit);

            curveG = board.create("point", [
                () => (JXG.Math.Numerics.splineEval(curvet.Value() * tmax, datat, splineX, splineXdd)),
                () => (JXG.Math.Numerics.splineEval(curvet.Value() * tmax, datat, splineY, splineYdd))],
                { name: 'G', visible: false }
                //{ name: '\\((x,y)\\)' }
            );


            im2 = board.create('image',
                [
                    'data:image/png;base64, iVBORw0KGgoAAAANSUhEUgAAAIAAAACACAYAAADDPmHLAAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAAAJcEhZcwAAITgAACE4AUWWMWAAAAGHaVRYdFhNTDpjb20uYWRvYmUueG1wAAAAAAA8P3hwYWNrZXQgYmVnaW49J++7vycgaWQ9J1c1TTBNcENlaGlIenJlU3pOVGN6a2M5ZCc/Pg0KPHg6eG1wbWV0YSB4bWxuczp4PSJhZG9iZTpuczptZXRhLyI+PHJkZjpSREYgeG1sbnM6cmRmPSJodHRwOi8vd3d3LnczLm9yZy8xOTk5LzAyLzIyLXJkZi1zeW50YXgtbnMjIj48cmRmOkRlc2NyaXB0aW9uIHJkZjphYm91dD0idXVpZDpmYWY1YmRkNS1iYTNkLTExZGEtYWQzMS1kMzNkNzUxODJmMWIiIHhtbG5zOnRpZmY9Imh0dHA6Ly9ucy5hZG9iZS5jb20vdGlmZi8xLjAvIj48dGlmZjpPcmllbnRhdGlvbj4xPC90aWZmOk9yaWVudGF0aW9uPjwvcmRmOkRlc2NyaXB0aW9uPjwvcmRmOlJERj48L3g6eG1wbWV0YT4NCjw/eHBhY2tldCBlbmQ9J3cnPz4slJgLAAAg+0lEQVR4Xu2deXhU5dn/P2dmkpnsewgJISyBxCTs+74jWkCtQAUXKthWqdran21fFWxta9+KvmBRq/Z9bQERKIi4FCwQDHtICGHNRvaErJN9m5nMcv/+SCYdRmxduCoz4XNd55rMnPucmTzP9zz3/exwi16N4vxBb8FgMEh1TTVqlRqDwUBcXJxitVpFrVb32jTpdUyeOFUAWbnyYXE+11tQOX/QW9j8l81iEwupp1MpKSmipqamV4qg1wqgoKiAsvIyMs9k4KXV8vzzzzub9Ap6pQAKCgpkx44dDB0yBE+dlqCQIHbt2kVhYWGvKwV6pQDKy8vR6XRMnT6dRYvuIjY2jsbGRt5/f6+z6S3cEX9/f9m0aZM888wzcuVKvpw6dUqmTZkiEeF9pbGxqVeVAmrnD9ydV199VawWK3PmzqFPnzBCQ8MIDQ3E08ODyzk5dLQbSEn57AXn69yVXuUC2traJONMBp46T0aPHE1LSzuVlVX07z9IiR44mGVLl3LoUAoZGWd6VSnQa8hIzxBALl64KCaTSVJTT8i2bdukvb1dCq7ky+nTaTJx4jhZt27tLQG4I/369ZMJkyYIwJYtW+S9996VwsJC2ffpPlm1apXU1dXJb37zGxk8aKj8+f/e6RUi6DUu4MiRIxISEsJPn/wper1epkyZwpgx42hubkateBASEkpLcwuD4wZTWlFGdWW18y3ckl4jgLq6OiwWC9OnT+fcuXP86le/4oMP9vD888/z0Ud7Kb9azDt/+T8WzLqd5UuXUVJSRFFRUa8oBXoFiqLIL3/5S6G7JpCfny/t7e1y+nS6FBeXy4ULmbL/7/tFX6OX7Tt3yISJE2Xz5s0C0NHRcUsIrszLL78sXl5eUlFRIQAbN268boZevHhZkg8nS3Nzk8TGxsqPf/zj69q5E73CBSQnJ/PUU08RFRWlvP76Jhk+PAkAq9UqFotFOjuNYrVaZejQWNpa2wgICFSW37eCkqtlpJ5OFZvN5rZCcHsBbN++TbKzsxk7diwAI0aMIiZmAAAigkpRoVJpUBQFnU6njBgxgrS0NLnrnnvw0Og4mnIMo8HgdNdbuAwzZs2SgCB/sVisotfXyKZNmwTAZLGIwWiUjvZ2aTV2iKOfTz50SHKyc2Xjpk2SMGyYiNUqAEaj0W1LAndGPvrwfQFISTkuJ06cEIDyq1e7hGAyidVmEYC2ti4R5OfnS3p6uj2zpbi4WAAsli47d8Kthz+t/v73paCgiO07d+Lv78u6tWsZPX405eXldLQZCQjwx2YTAgICuFpRQWhYGDm5OUyZ         function controlAnimate() {
            if (animFlag) {
                curvet.stopAnimation();
                animFlag = false;
            } else {
                curvet.startAnimation(1, 20, 60, 3);
                animFlag = true;
            }
        }
        function toggleList(inputList) {
            for (let iloop = 0; iloop < inputList.length; iloop++) {
                if (JXG.exists(inputList[iloop])) {
                    if (inputList[iloop].getAttribute("visible")) {
                        inputList[iloop].setAttribute({ visible: false });
                    } else {
                        inputList[iloop].setAttribute({ visible: true });
                        inputList[iloop].show();
                    }
                    inputList[iloop].update();
                }
            }
        }

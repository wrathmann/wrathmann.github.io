<head>
  <title>Implicit plot</title>
  <meta name="robots" content="noindex, nofollow" />
  <meta name="viewport" content="width=device-width" />
  <script type="text/javascript" charset="UTF-8"
    src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>
  <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css" />
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <style>
    body {
      font-family: sans-serif;
      margin: 0pt;
    }
  </style>
</head>

<body>
  <div id="jxgframe" style="width: 75vw; height: 75vh">
    <script>
      divid = "jxgframe";
    </script>
    <div id="jxgbox" class="jxgbox" style="width: 800px; height: 400px"></div>
  </div>
  <script type="text/javascript">
    "use strict";
    document.getElementById(divid).classList.remove("jxgbox"); /* Remove the default style. */
    document.getElementById(divid).innerHTML = "<table style='width:98vw;height:98vh;'>" + "<tr><td><div id='box1'> </div></td><td><div id='box2'> </div></td></tr>" + "</table>";
    for (var i = 1; JXG.Math.lt(i, 2 + 1); i++) {
      var el = document.getElementById("box" + i);
      el.classList.add("jxgbox");
      /* You will have to do some random tuning of the margins and sizes as the default iframe might not have enough space. */
      el.style.width = "48vw";
      el.style.height = "96vh";
      /*
           el.style.width = "500px";
           el.style.height = "500px";*/
    }
    JXG.Options.text.useMathJax = true;
    var board = JXG.JSXGraph.initBoard("box1", {
      boundingbox: [-2, 2, 2, -2],
      axis: true,
      keepaspectratio: true,
      showFullscreen: true,
    });
    var board2 = JXG.JSXGraph.initBoard("box2", {
      boundingbox: [-8, 8, 8, -10],
      keepaspectratio: true,
      axis: false,
    });
    board.addChild(board2);
    var box = [-2, 2];
    var view = board2.create("view3d", [
      [-6, -6],
      [8, 8],
      [box, box, box],
    ], {
      projection: 'parallel',
      axesPosition: 'border',
      xPlaneRear: {
        visible: false
      },
      xPlaneRearYAxis: {
        visible: false
      },
      xPlaneRearZAxis: {
        visible: false
      },
      yPlaneRear: {
        visible: false
      },
      yPlaneRearXAxis: {
        visible: false
      },
      yPlaneRearZAxis: {
        visible: false
      },
    });
    view.az_slide.setValue(3.4);
    view.el_slide.setValue(1.1);
    //slider-based curve
    // board.create('circle', [[0, 0], 2], {strokeWidth: 0.8, strokeColor: 'red'});
    var ffun, f3d, txtf, txtfx, txtfy, radius;
    var cf = [],
      cf2 = [],
      cf3 = [],
      gradf, direction, directionVec = [],
      gradfx, gradfy, gradc, gradcx, gradcy, gl1, gl2, cutCurve;
    var l1, l2, l3, l4, l5;
    var Axy, A, lineA, plane1, cl1;
    var Fdx, Fdy, dFx1, dFx2, dFy1, dFy2, dFx_vec, dFy_vec, dFx_vecnorm, dFy_vecnorm;
    var niveauline = [], niveaunum, niveaumax, niveaumin, niveauh, legend, niveauopac=[];

    /* init variables */
    niveauline = [-0.9, -0.5, 0, 0.5, 0.9];

    niveaunum = 7;

    txtf = "cos(2*x)*cos(2*y)";
    /*txtf = "cos(2*x)*sin(2*y)";
    txtf = "(2*x*x+y*y/2)/4-1";
    txtf = "(1-x)^2 + 10*(y-x^2)^2"*/
    /*txtf = '{#f#}';*/


    var s = board.create("slider", [
      [-1, 1.6],
      [1, 1.6],
      [0, 0.5, 1],
    ], {
      name: "scale",
      snapWidth: 0.05,
      point1: {
        frozen: true
      },
      point2: {
        frozen: true
      }
    });
    /*
    var s2 = board2.create("slider", [
      [-5, 6.4],
      [0, 6.4],
      [0, 0.5, 1],
    ], {
      name: "scale",
      snapWidth: 0.05,
      point1: {
        frozen: true
      },
      point2: {
        frozen: true
      }
    });
    */
    var radius = board.create("slider", [
      [-1, 1.3],
      [1, 1.3],
      [0, 0.5, 1],
    ], {
      name: "radius",
      snapWidth: 0.05,
      point1: {
        frozen: true
      },
      point2: {
        frozen: true
      }
    });


    setObjective();
    plot();

    function plot() {
      var i;
      board.removeObject([cf, gl1, gl2, cl1, gradf, direction, cutCurve]);
      board2.removeObject([f3d, Axy, A, lineA, plane1]);
      /* let i = 1; i <= niveaunum; i++*/
      niveauline = [];
      for (i = 0; JXG.Math.lt(i, niveaunum); i++) {
        let niveaui = niveaumin + (i + 1) * niveauh;
        niveauline.push(niveaui.toFixed(2));
        niveauopac.push( ((6 + i) / (niveaunum + 5)) * 0.5);
        cf.push(board.create("implicitcurve", [
          txtf + "-(" + niveaui.toFixed(2) + ")", txtfx, txtfy, [-2, 2],
          [-2, 2],
        ], {
          strokeWidth: 2,
          strokeColor: '#000000', /*JXG.palette.black*/
          strokeOpacity: niveauopac[i],
          needsRegularUpdate: false,
          name: "niveau",
        }));
        /* name wird genutzt, im den Index im curve3D array wieder zu finden*/
        cf2.push(view.create("curve3d", [
          [],
          [],
          []
        ], {
          name: i,
          strokeWidth: 1.5,
          strokeOpacity: ((6 + i) / (niveaunum + 5)) * 0.5,
          strokeColor: '#000000', /* JXG.palette.red,*/
        }));
        cf3.push(view.create("curve3d", [[], [], []], {
          name: i,
          strokeWidth: 1,
          strokeOpacity: ((6 + i) / (niveaunum + 5)) * 0.5,
          strokeColor: '#000000',/*JXG.palette.red,*/
        }));
        cf3[i].updateDataArray = function () {
          var ipt;
          var check;
          this.dataX = [];
          this.dataY = [];
          this.dataZ = [];
          for (ipt = 0; ipt < cf[this.name].numberPoints; ipt++) {
            check = cf[this.name].points[ipt].usrCoords[1];
            this.dataX.push(check);
            check = cf[this.name].points[ipt].usrCoords[2];
            this.dataY.push(check);
            this.dataZ.push(box[0]);
          }
        };
      }
      var legendwidth = 0.5;
      legend = board2.create('legend', [3, 4], {
        labels: niveauline,
        colors: [cf3[0].visProp.strokecolor],
        strokeOpacity:niveauopac,
        rowHeight: 15,
        frozen: true
      });
      /*
            for (i = 0; i < niveaunum; i++) {
              legend.lines[i].setAttribute({ strokeOpacity: Number(cf3[i].visProp.strokeopacity) });
              legend.lines[i].setAttribute({ point1: { frozen: true }, point2: { frozen: true } });
              legend.lines[i].point2.coords = new JXG.Coords(JXG.COORDS_BY_USER,
                [1, legend.lines[i].point1.coords.usrCoords[1] + legendwidth, legend.lines[i].point1.coords.usrCoords[2]], board2);
            }
                */
      gl1 = board.create("point", [0.2, -0.5], {
        name: "\\(x_0\\)",
        label: { strokeColor: JXG.palette.blue, fontSize: 20 }
      });
      cl1 = board.create("circle", [gl1, () => radius.Value()]);
      gl2 = board.create("glider", [gl1.X() + 1, gl1.Y(), cl1], {
        name: "direction",
        label: { strokeColor: JXG.palette.blue, fontSize: 20 }
      });
      // die Formulierung ist zu allgemein. Es würde genügen, durch den Radius zu dividieren, da der Abstand zwischen gl1 und gl2 immer gleich dem Radius ist.
      //directionVec = [()=>((gl2.X()-gl1.X())/Math.sqrt((gl2.X()-gl1.X())**2+(gl2.Y()-gl1.Y())**2)),()=>((gl2.Y()-gl1.Y())/Math.sqrt((gl2.X()-gl1.X())**2+(gl2.Y()-gl1.Y())**2))];
      directionVec = [() => ((gl2.X() - gl1.X()) / radius.Value()), () => ((gl2.Y() - gl1.Y()) / radius.Value())];

      gradf = board.create("arrow", [
        [
          function () {
            return gl1.X();
          },
          function () {
            return gl1.Y();
          },
        ],
        [
          function () {
            return gl1.X() + gradfx(gl1.X(), gl1.Y()) * s.Value();
          },
          function () {
            return gl1.Y() + gradfy(gl1.X(), gl1.Y()) * s.Value();
          },
        ],
      ], {
        strokeColor: JXG.palette.red,
        point2: {
          visible: true,
          size: 0,
          withLabel: true,
          name: "\\(\\nabla f(x_0)\\)",
          label: { strokeColor: JXG.palette.red, fontSize: 20 }
        }
      });
      direction = board.create("arrow", [gl1, gl2], {
        strokeColor: JXG.palette.blue,
      });
      f3d = view.create("functiongraph3d", [ffun, box, box], {
        strokeWidth: 0.5,
        stepU: 70,
        stepsV: 70,
        strokeOpacity: 0.85
      });
      cutCurve = view.create("curve3d", [(t) => (t * gl1.X() + (1 - t) * gl2.X()), (t) => (t * gl1.Y() + (1 - t) * gl2.Y()),
      (t) => (ffun((t * gl1.X() + (1 - t) * gl2.X()), t * gl1.Y() + (1 - t) * gl2.Y())), [-1, 3]], {
        strokeWidth: 2,
        stepU: 70,
        stepsV: 70,
        strokeOpacity: 1
      });

      Axy = view.create("point3d", () => [gl1.X(), gl1.Y(), -2], {
        withLabel: false
      });
      // Project Axy to the surface
      A = view.create("point3d", [() => [Axy.X(), Axy.Y(), ffun(Axy.X(), Axy.Y())]], {
        withLabel: false
      });
      lineA = view.create("line3d", [Axy, A], {
        dash: 1
      });
      Fdx = () => gradfx(A.X(), A.Y());
      Fdy = () => gradfy(A.X(), A.Y());
      dFx_vecnorm = () => Math.sqrt(1 + gradfx(A.X(), A.Y()) ** 2);
      dFy_vecnorm = () => Math.sqrt(1 + gradfy(A.X(), A.Y()) ** 2);
      dFx1 = () => 1.0 / dFx_vecnorm();
      dFx2 = () => gradfx(A.X(), A.Y()) / Math.sqrt(1 + gradfx(A.X(), A.Y()) ** 2);
      dFy1 = () => 1.0 / Math.sqrt(1 + Fdy(A.X(), A.Y()) ** 2);
      dFy2 = () => gradfy(A.X(), A.Y()) / Math.sqrt(1 + gradfy(A.X(), A.Y()) ** 2);
      dFx_vec = [dFx1, 0, dFx2];
      dFy_vec = [0, dFy1, dFy2];
      // Tangent plane
      plane1 = view.create("plane3d", [A, dFx_vec, dFy_vec, [() => -s.Value(), () => s.Value()],
        [() => -s.Value(), () => s.Value()]
      ], {
        strokeOpacity: 1,
        gradientSecondOpacity: 1,
        fillOpacity: 0.4,
        fillColor: "red",
      });
      // partial derivatives
      l1 = view.create('line3d', [A, dFx_vec, [0, () => s.Value()]], {
        point1: {
          visible: false
        },
        point2: {
          visible: false
        },
        dash: 1,
        lastArrow: true
      });
      l2 = view.create('line3d', [A, dFy_vec, [0, () => s.Value()]], {
        point1: {
          visible: false
        },
        point2: {
          visible: false
        },
        dash: 1,
        lastArrow: true
      });
      l3 = view.create('line3d', [A, () => [-dFx2(), -dFy2(), dFx1() * dFy1()],
        [0, () => s.Value()]
      ], {
        point1: {
          visible: false
        },
        point2: {
          visible: false
        },
        lastArrow: true
      });
      l4 = view.create('line3d', [Axy, () => [-Fdx(), -Fdy(), 0],
        [0, () => s.Value()]
      ], {
        point2: {
          visible: true,
          size: 0,
          name: "\\(-\\nabla f(x_0)\\)",
          label: { strokeColor: JXG.palette.red, fontSize: 20 }
        },
        point1: {
          visible: false
        },
        lastArrow: true,
        strokeColor: JXG.palette.red,
        strokeWidth: 2.0,
        strokeOpacity: 1,
      });
      l5 = view.create('line3d', [A, () => [directionVec[0](), directionVec[1](), Fdx() * directionVec[0]() + Fdy() * directionVec[1]()],
        [0, () => s.Value()]
      ], {
        point1: {
          visible: false
        },
        point2: {
          visible: false
        },
        lastArrow: true,
        strokeColor: JXG.palette.blue,
        strokeWidth: 1.5
      });
      /*
      Axy2 = view.create("point3d", () => [gl2.X(), gl2.Y(), -2], {
        withLabel: false,
        visible: false
      });
 
      // Project Axy to the surface
      A2 = view.create(
        "point3d",
        [() => [Axy2.X(), Axy2.Y(), ffun(Axy2.X(), Axy2.Y())]],
        { withLabel: false,
          visible: false }
      );
*/
      board.update();
    }

    function setObjective() {
      ffun = board.jc.snippet(txtf, true, "x,y");
      txtfx = board.jc.manipulate("D(" + txtf + ",x);");
      txtfy = board.jc.manipulate("D(" + txtf + ",y);");
      gradfx = board.jc.snippet(txtfx, true, "x,y");
      gradfy = board.jc.snippet(txtfy, true, "x,y");
      /* compute niveaumin, niveaumax */
      var minx = -2;
      var miny = -2;
      var maxx = 2;
      var maxy = 2;
      var hx = 0.2;
      var hy = 0.2;
      niveaumax = -100000;
      niveaumin = 100000;
      for (let xloop = minx; xloop < maxx; xloop += hx) {
        for (let yloop = miny; yloop < maxy; yloop += hy) {
          let fval = ffun(xloop, yloop);
          if (niveaumax < fval) {
            niveaumax = fval;
          }
          if (niveaumin > fval) {
            niveaumin = fval;
          }
        }
      }
      niveauh = (niveaumax - niveaumin) / (niveaunum + 1);
    }
  </script>
</body>

<head>
  <title>Tangential plane</title>
  <meta name="robots" content="noindex, nofollow" />
  <meta name="viewport" content="width=device-width" />
  <script type="text/javascript" charset="UTF-8"
    src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>
  <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css" />
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <style>
    body {
      font-family: sans-serif;
      margin: 0pt;
    }
  </style>
</head>

<body>
  <article>
    <h2>3D function graph with Tangentplane</h2>
    <p>
      Function: \(f:\mathbb{R}^2\to\mathbb{R}\)<br />
    </p>
    <table style="width: 100;">
      <tr>
        <td>
          <center>
            <div id="jxgbox5" class="jxgbox construct" style="width: 600px;height: 600px;"></div>
          </center>
        </td>
      </tr>
    </table>
    <script>
      "use strict";
      var dFx, dFy, dFx1, dFx2, xlabel, ylabel, dFx_vec, dFx_vecnorm, dFy_vec, dFy_vecnorm, dFy1, dFy2;
      var F, Fdx, Fdy, c, Axy, A, dFx_vec, dFx_vecnorm, cutCurveX, cutCurveY;
      var plane1, a, b;
      var board = JXG.JSXGraph.initBoard('jxgbox5', {
        boundingbox: [-8, 8, 8, -10],
        keepaspectratio: false,
        axis: false,
        pan: { enabled: false }
      });

      var box = [-3, 3];
      var box2plot = [-3, 2];
      var boxz = [-1, 3];
      var view = board.create('view3d',
        [
          [-6, -6], [8, 8],
          [box, box, boxz]
        ],
        {
          axesPosition: 'border',
          xPlaneRear: { visible: false },
          xPlaneRearYAxis: { visible: false },
          xPlaneRearZAxis: { visible: false },
          yPlaneRear: { visible: false },
          yPlaneRearXAxis: { visible: false },
          yPlaneRearZAxis: { visible: false },
        });
      xlabel = view.create('text3d', [box[1] * 1.1, 0.1, boxz[0], 'x']);
      ylabel = view.create('text3d', [0.1, box[1] * 1.1, boxz[0], 'y']);
      view.az_slide.setValue(0.9); view.el_slide.setValue(0.9);

      // entries of quadratic form given from outside
      var a1g = 0;
      var a2g = 0.5;
      var a3g = 0;
      var h = 0.1;
      //            var inputFun = board.create("input", [-5, 7, "sin(x)*cos(y)", "f(x,y)="], {
      var inputFun = board.create("input", [-5, 7, "cos(x)*sin(y)", "f(x,y)="], {
        cssStyle: "width: 100px",
      });
      var inputPlot = board.create("button", [-1, 7, "Plot", function () { plot(); }], {
        cssStyle: "width: 50px",
      });
      var buttonGraph = board.create("button", [3, 7, "Graph \\(f \\)", function () { toggleList([c]); }], {
        cssStyle: "width: 150px",
      });
      var buttonTPlane = board.create("button", [3, 0, "Tangentialebene", function () { toggleList([plane1]); }], {
        cssStyle: "width: 150px",
      });
      var buttonTangentX = board.create("button", [2, 5.5, "\\( f({x0},y0)+\\frac{\\partial}{\\partial x}f(x0,y0)(x-x0) \\)", function () { toggleList([a]); }], {
        cssStyle: "height:60px",
      });
      var buttonTangentY = board.create("button", [2, 3.5, "\\( f({x0},y0)+\\frac{\\partial}{\\partial y}f(x0,y0)(y-y0) \\)", function () { toggleList([b]); }], {
        cssStyle: "height:60px",
      });
      var buttonCutCurveX = board.create("button", [3, 2, "\\( g(t)=f({x0}+t,y0) \\)", function () { toggleList([cutCurveX]); }], {
        cssStyle: "width: 150px",
      });
      var buttonCutCurveY = board.create("button", [3, 1, "\\( g(t)=f({x0},y0+t) \\)", function () { toggleList([cutCurveY]); }], {
        cssStyle: "width: 150px",
      });
      var buttonIso = board.create('button', [0, -8, '3D view', () => { view.az_slide.setValue(0.9); view.el_slide.setValue(0.9); }]);
      var buttonXZ = board.create('button', [2, -8, 'xz-plane', () => { view.az_slide.setValue(3.14); view.el_slide.setValue(0.05); }]);
      var buttonYZ = board.create('button', [4, -8, 'yz-plane', () => { view.az_slide.setValue(1.57); view.el_slide.setValue(0.05); }]);

      plot();

      function plot() {
        board.removeObject([Axy, A, c, plane1, a, b, cutCurveX]);

        // Function Fgiven to be plotted
        F = board.jc.snippet(inputFun.Value(), true, "x,y", true);
        Fdx = (x, y) => (F(x + h, y) - F(x, y)) / h;
        Fdy = (x, y) => (F(x, y + h) - F(x, y)) / h;
        // 3D surface
        c = view.create('functiongraph3d', [
          F,
          box2plot,
          box2plot,
        ], {
          strokeWidth: 0.5,
          stepU: 70, stepsV: 70,
          strokeColor: JXG.palette.skyblue
        });

        // 3D points:
        // Point on xy plane
        Axy = view.create('point3d', [1, 1, boxz[0]], { withLabel: false });

        // Project Axy to the surface
        A = view.create('point3d', [
          () => [Axy.X(), Axy.Y(), F(Axy.X(), Axy.Y())]
        ], { withLabel: false });
        view.create('line3d', [Axy, A], { dash: 1 })

        // Partial derivatives of F in point A
        dFx = () => Fdx(A.X(), A.Y());
        dFy = () => Fdy(A.X(), A.Y());
        //dFx_vecnorm = () => Math.sqrt(1 + Fdx(A.X(), A.Y()) ** 2);
        //dFy_vecnorm = () => Math.sqrt(1 + Fdy(A.X(), A.Y()) ** 2);

        // var dFx1 = () => 1.0/Math.sqrt(1+Fdx(A.X(),A.Y())**2),
        dFx1 = () => 1.0 / Math.sqrt(1 + Fdx(A.X(), A.Y()) ** 2);
        dFx2 = () => Fdx(A.X(), A.Y()) / Math.sqrt(1 + Fdx(A.X(), A.Y()) ** 2);
        dFy1 = () => 1.0 / Math.sqrt(1 + Fdy(A.X(), A.Y()) ** 2);
        dFy2 = () => Fdy(A.X(), A.Y()) / Math.sqrt(1 + Fdy(A.X(), A.Y()) ** 2);

        dFx_vec = [dFx1, () => 0, dFx2];
        dFy_vec = [() => 0, dFy1, dFy2];

        // Tangent plane
        plane1 = view.create('plane3d', [
          A,
          dFx_vec, dFy_vec,
          [-1, 1], [-1, 1]
        ], {
          fillOpacity: 0.8, fillColor: 'red',
          visible: false
        });
        a = view.create('line3d', [A, dFx_vec, [0, 1]], { lastArrow: true, strokeWidth: 2, strokeColor: JXG.palette.blue });
        b = view.create('line3d', [A, dFy_vec, [0, 1]], { lastArrow: true, strokeWidth: 2, strokeColor: JXG.palette.blue });
        cutCurveX = view.create("curve3d", [(t) => (t * A.X() + (1 - t) * (A.X() + 1)), (t) => (A.Y()),
        (t) => (F(t * A.X() + (1 - t) * (A.X() + 1), A.Y())), [-1, 3]], {
          strokeWidth: 2,
          strokeOpacity: 0.5,
          visible: false
        });
        cutCurveY = view.create("curve3d", [(t) => (A.X()), (t) => (t * A.Y() + (1 - t) * (A.Y() + 1)),
        (t) => (F(A.X(), t * A.Y() + (1 - t) * (A.Y() + 1))), [-1, 3]], {
          strokeWidth: 2,
          strokeOpacity: 0.5,
          visible: false
        });


      }
      function toggleList(inputList) {
        for (let iloop = 0; iloop < inputList.length; iloop++) {
          if (JXG.exists(inputList[iloop])) {
            if (inputList[iloop].getAttribute("visible")) {
              inputList[iloop].setAttribute({ visible: false });
            } else {
              inputList[iloop].setAttribute({ visible: true });
              inputList[iloop].show();
            }
            inputList[iloop].update();
          }
        }
      }


    </script>
  </article>

  <p>
    Beispiele
  <ul>
    <li>
      \(f(x)=\)<code>cos(x)*sin(y)</code>
    </li>
    <li>
      \(f(x)=\)<code>x^2+y^2-1</code>
    </li>
    <li>
      \(f(x)=\)<code>abs(x)+abs(y)</code>
    </li>
    <li>
      \(f(x)=\)<code>x^3*y+x*exp(y)</code>
    </li>
  </ul>
  </p>

  <footer>
    Wigand Rathmann, FAU
  </footer>
</body>

</html>
